<!DOCTYPE html>
<html>
<head>
<title>PEHरावा</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f7f7f7;
}

header{
background:#7b1e2b;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

nav{
background:#eee;
padding:10px;
text-align:center;
}

nav button{
margin:5px;
padding:10px 15px;
border:none;
background:#7b1e2b;
color:white;
cursor:pointer;
border-radius:5px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:white;
width:220px;
margin:15px;
padding:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
text-align:center;
}

.product img{
width:100%;
border-radius:8px;
}

.price{
color:#7b1e2b;
font-weight:bold;
}

.orderbtn{
background:#25D366;
color:white;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
PEHरावा Women Wear
</header>

<nav>

<button onclick="filterProducts('all')">All</button>

<button onclick="filterProducts('ethnic')">
Ethnic Suits
</button>

<button onclick="filterProducts('kurtis')">
Short Kurtis
</button>

<button onclick="filterProducts('plazo')">
Plazzo Suits
</button>

<button onclick="filterProducts('dresses')">
Dresses
</button>

<button onclick="filterProducts('party')">
Party Wear
</button>

</nav>

<div class="container" id="productContainer"></div>

<script>

let whatsappNumber="917087572605";

let products=[

{
name:"Maroon Short Kurti",
price:"389",
category:"Kurti's",
image:"product1.jpg"
},


];

function displayProducts(list){

let container=document.getElementById("productContainer");
container.innerHTML="";

list.forEach(product=>{

let card=document.createElement("div");
card.className="product";

card.innerHTML=`

<img src="${product.image}">

<h3>${product.name}</h3>

<p class="price">₹${product.price}</p>

<a href="https://wa.me/${whatsappNumber}?text=I want to order ${product.name}">
<button class="orderbtn">Order on WhatsApp</button>
</a>

`;

container.appendChild(card);

});

}

function filterProducts(category){

if(category==="all"){
displayProducts(products);
return;
}

let filtered=products.filter(p=>p.category===category);
displayProducts(filtered);

}

displayProducts(products);

</script>

</body>
</html>
